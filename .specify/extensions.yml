installed:
- agent-context
- evidence
settings:
  auto_execute_hooks: true
hooks:
  after_specify:
  - extension: agent-context
    command: speckit.agent-context.update
    enabled: true
    optional: true
    priority: 10
    prompt: Execute speckit.agent-context.update?
    description: Refresh agent context after specification
    condition: null
  after_plan:
  - extension: agent-context
    command: speckit.agent-context.update
    enabled: true
    optional: true
    priority: 10
    prompt: Execute speckit.agent-context.update?
    description: Refresh agent context after planning
    condition: null
  before_implement:
  - extension: evidence
    command: speckit.evidence.graph
    enabled: true
    optional: false
    priority: 10
    prompt: Validate task DAG before implementation begins?
    description: Refuse to start /speckit.implement on a broken graph (cycles, dangling
      refs)
    condition: null
  after_implement:
  - extension: evidence
    command: speckit.evidence.audit
    enabled: true
    optional: false
    priority: 10
    prompt: Run evidence audit now?
    description: Merge-gate audit — hard-blocks on [S]/[S*] or diff-scan hits unless
      --accept-synthetic
    condition: null
