name: Locked restore
description: >-
  The single definition of the deterministic locked NuGet restore (ADR-0031,
  FS-GG/.github#429, FS.GG.Governance#169). Restores in --locked-mode against the committed
  packages.lock.json so any dependency-graph drift, or a silently substituted version
  (NU1603) / out-of-range version (NU1608), fails the gate instead of resolving quietly.
  Consolidates the seven duplicated inline "Restore (locked)" steps (five in gate.yml, two in
  publish.yml) so the enforcement, the error text, and the --force-evaluate regenerate hint live
  in exactly one place.

  The restore is COLD by construction: it resolves into a fresh, empty package folder with the
  HTTP cache cleared, so --locked-mode validates the committed contentHash against THE FEED. A
  warm package folder silently degrades the gate into comparing one record of reality against
  another — see below. This repo is the largest committed-hash surface in the org (171 lock
  files, 163 of them pinning FSharp.Core) and a pure CONSUMER of the token-gated org feed, so it
  is the worst place for that degradation to be latent.

  Adopted from FS.GG.SDD's action of the same name. Deliberately NOT adopted: FS.GG.Rendering's
  `--configfile nuget.config` variant (#186). That is correct THERE because Rendering's
  nuget.config <clear/>s and declares nuget.org itself; this repo's nuget.config adds the org
  feed ADDITIVELY and inherits nuget.org from the machine hierarchy, which --configfile stops
  walking — so it would leave packageSourceMapping pointing at a nuget.org key that no longer
  exists, and every public package (Expecto, YamlDotNet, …) would fail to resolve.

inputs:
  target:
    description: >-
      The solution or single project file to restore in locked mode. Defaults to the whole
      solution; the pack-guard, CLI-test, smoke and publish jobs pass a single .fsproj to keep
      their restore scoped to what they actually build.
    required: false
    default: FS.GG.Governance.sln

runs:
  using: composite
  steps:
    # Why a fresh package folder (FS-GG/.github#429, epic #266 "compare against reality,
    # not against a record of reality"):
    #
    # NU1403 ("package content hash validation failed") is raised by comparing the lock
    # file against the package ALREADY PRESENT in the global-packages folder. If that copy
    # is stale — restored from the actions cache, or pre-seeded in the runner image — then
    # --locked-mode validates a record against a record and never contacts the feed. The
    # gate then fails in BOTH directions, which is exactly what happened to FSharp.Core
    # 10.1.301 after it was re-published:
    #
    #   * green on main with a lock file NO FRESH CLONE COULD RESTORE  (fails open), and
    #   * red on a correct, freshly-generated lock file                 (fails closed).
    #
    # Restoring into an empty NUGET_PACKAGES forces a real download, so the hash the gate
    # checks is the hash the feed actually serves. NUGET_PACKAGES is exported to GITHUB_ENV
    # so the later --no-restore build / --no-build test steps resolve from the same folder.
    #
    # NOTE: NUGET_PACKAGES relocates the global-packages folder but NOT the HTTP cache, which
    # will happily replay stale .nupkg bytes. Clearing it is load-bearing, not belt-and-braces.
    - name: Restore (locked, cold)
      shell: bash
      env:
        LOCKED_RESTORE_TARGET: ${{ inputs.target }}
      run: |
        set -euo pipefail

        NUGET_PACKAGES="$(mktemp -d)"
        export NUGET_PACKAGES
        echo "NUGET_PACKAGES=$NUGET_PACKAGES" >> "$GITHUB_ENV"
        dotnet nuget locals http-cache --clear

        if dotnet restore "$LOCKED_RESTORE_TARGET" --locked-mode; then
          exit 0
        fi

        # The restore failed against the feed. Several similar-looking base64 hashes sit around a
        # NuGet package — the lock's contentHash, the .nupkg.sha512 sidecar, the .nupkg.metadata
        # record — and they are NOT interchangeable, so an author hand-copying one out of an error
        # message re-breaks the build as often as not. Regenerate from the feed instead and print
        # exactly what to commit.
        echo "::group::what a cold restore from the feed actually resolves (commit this)"
        dotnet restore "$LOCKED_RESTORE_TARGET" --force-evaluate >/dev/null 2>&1 || true
        git --no-pager diff --stat -- '**/packages.lock.json' || true
        git --no-pager diff -- '**/packages.lock.json' || true
        echo "::endgroup::"

        echo "::error::locked restore failed — the committed packages.lock.json does not match what the feed serves (or a version was substituted, NU1603). The diff above is what a cold restore resolves; regenerate with: dotnet restore $LOCKED_RESTORE_TARGET --force-evaluate  and commit the updated packages.lock.json files. Let --force-evaluate write the hash — never hand-copy one, and note the lock's contentHash is NOT the .nupkg's SHA512."
        exit 1
