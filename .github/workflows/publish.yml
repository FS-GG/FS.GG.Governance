name: publish

# Repo-owned publisher for the two publishable Governance artifacts: the consumer-bearing CLI tool
# FS.GG.Governance.Cli (spec 089, FS.GG.Governance#28) and the content-only FS.GG.Governance.
# ReferenceGateSet (spec 086/094). Each publishes to BOTH feeds — the org GitHub Packages feed FIRST,
# then public nuget.org via Trusted Publishing (OIDC, ADR-0013) — byte-identically, no re-pack
# (spec 094, FS.GG.Governance#41). The CLI's PackAsTool closure bundles Adapters.SddHandoff.dll so the
# installed `fsgg-governance` enforces a produced governance-handoff.json standalone. The other ~70
# packable FS.GG.Governance.* projects are OUT OF SCOPE here (H4/088-adjacent org-feed baseline).
#
# THE CONTRACTS are specs/089-publish-governance-cli/contracts/publish-workflow.md (base: triggers +
# version resolution + gating + CLI scope; + cli-enforcement.md for the smoke) and
# specs/094-nuget-org-publish/contracts/publish-workflow-nuget-org.md (the nuget.org leg + the
# reference-gate-set publish job).
# CLI jobs, ordered: resolve-version → cli-tests → enforcement-smoke (the green-by-omission guard,
# FR-008) → publish (org feed → nuget.org). The push runs ONLY after the smoke proves the packed tool
# blocks a failing handoff, so a consumer-less build can never reach the feed under the consumer-bearing
# version. The reference gate set publishes from its own job (publish-reference-gate-set), self-gated on
# the G1–G7 byte-identity guard inside pack-reference-gate-set.fsx before either push. Trusted
# Publishing login + push live in THIS file (never a reusable workflow — the nuget.org trust policy is
# registered against FS.GG.Governance/publish.yml; NuGet/login#6, ADR-0013). A dry-run dispatch (no
# version input) packs both packages but pushes to no feed; a missing trust policy 401s and fails loud.

on:
  release:
    types: [published]
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: "Explicit version to publish (e.g. 1.1.0). Omit for a pack-only dry run (no push)."
        type: string
        required: false

# A single tagged release fires BOTH `release: published` and `push: tags v*`. Serialize the paired
# runs (cancel-in-progress: false) keyed on the version/tag so neither push is cancelled mid-flight;
# the second run no-ops via --skip-duplicate.
concurrency:
  group: publish-${{ github.event.release.tag_name || github.ref_name }}
  cancel-in-progress: false

# Least privilege: the default token is read-only. Only the `publish` job below escalates to
# packages: write. Restore/pack read the org feed (FS.GG.Contracts etc.) cross-repo with the
# run-scoped token, exactly as gate.yml does.
permissions:
  contents: read
  packages: read

# Credentials for the `fsgg-github` source declared in nuget.config (env placeholders there), wired
# from the run-scoped token. Username can be any non-empty value for GitHub Packages.
env:
  FSGG_PACKAGES_ACTOR: ${{ github.actor }}
  FSGG_PACKAGES_READ_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  # 101 (low): the nuget.org Trusted-Publishing fallback user, declared ONCE and referenced by both
  # publish jobs (previously hardcoded in two separate places). secrets.NUGET_USER still overrides it.
  NUGET_FALLBACK_USER: Paradigma11

jobs:
  # Source of truth is the EVALUATED CLI fsproj <Version> (msbuild -getProperty, not a grep). A
  # version-bearing tag (v<semver>) MUST equal it; mismatch fails (no hardcoded version anywhere). A
  # dry-run dispatch (no version input) packs but does not push (FR-007 fail-safe: never silently skip).
  resolve-version:
    name: Resolve version (CLI fsproj)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.repository == 'FS-GG/FS.GG.Governance'
    outputs:
      version: ${{ steps.ver.outputs.version }}
      push: ${{ steps.ver.outputs.push }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
          # No NuGet cache. This job never restores — it only evaluates <Version> via `dotnet msbuild
          # -getProperty` — so the cache was dead weight. It is also removed to keep this file uniform:
          # a stray `cache: true` here is the line somebody copies into a job that DOES restore, which
          # is how the warm-package-folder defect (#169) regenerates itself.
          cache: false

      - name: Resolve version
        id: ver
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          strip_v() { printf '%s' "${1#v}"; }

          version="$(dotnet msbuild src/FS.GG.Governance.Cli/FS.GG.Governance.Cli.fsproj -getProperty:Version)"
          version="$(printf '%s' "$version" | tr -d '[:space:]')"
          [ -n "$version" ] || { echo "::error::could not read <Version> from FS.GG.Governance.Cli.fsproj (build defect)."; exit 1; }

          push=""
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [ -n "${INPUT_VERSION:-}" ]; then
              req="$(strip_v "$INPUT_VERSION")"
              if [ "$req" != "$version" ]; then
                echo "::error::dispatch version input '$INPUT_VERSION' ($req) does not equal the fsproj <Version> ($version). The fsproj is the source of truth; reconcile before publishing."
                exit 1
              fi
              push="true"
            else
              push="false"
              echo "::notice::dry run — packing FS.GG.Governance.Cli $version but NOT pushing (manual dispatch with no version input)."
            fi
          else
            # release: published OR push: tags v* — a real publish from the fsproj version.
            tag="$RELEASE_TAG"; [ -z "$tag" ] && tag="$REF_NAME"
            if printf '%s' "$tag" | grep -Eq '^v?[0-9]+\.[0-9]+\.[0-9]+'; then
              tag_version="$(strip_v "$tag")"
              if [ "$tag_version" != "$version" ]; then
                echo "::error::release tag '$tag' (version $tag_version) does not equal the FS.GG.Governance.Cli fsproj <Version> ($version). The fsproj is the source of truth; reconcile the tag or the fsproj before releasing."
                exit 1
              fi
            else
              # 101 (M-CI-4): a v* tag that is NOT a semantic version (e.g. vNext) must NOT fall through to a
              # push with an unchecked label. Fail closed — the fsproj <Version> is the sole source of truth.
              echo "::error::release tag '$tag' is not a semantic version; it cannot be reconciled against the FS.GG.Governance.Cli fsproj <Version> ($version). Retag with v<major>.<minor>.<patch> (matching the fsproj) before releasing."
              exit 1
            fi
            push="true"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "push=$push" >> "$GITHUB_OUTPUT"
          echo "Resolved: version=$version push=$push (event=$EVENT_NAME)"

  # Pre-publish gate #1: the CLI test suite (mirrors SDD's cli-tests). Locked restore so a graph drift
  # fails here, not quietly downstream. `publish` does not start until this is green.
  cli-tests:
    name: CLI tests (publish gate)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: github.repository == 'FS-GG/FS.GG.Governance'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
          # No NuGet cache: the locked restore below is cold by construction (#169), so a cache would
          # be restored and never read. A warm folder would turn this locked restore — the release
          # path's lock gate — into a record-vs-record comparison that never contacts the feed.
          cache: false

      # COLD locked restore (#169): fresh package folder + cleared HTTP cache, so the committed
      # contentHash is validated against THE FEED. This job gates the publish (`publish` needs it), so
      # a lock file no fresh clone could restore must fail HERE, before anything is shipped.
      - name: Restore (locked, cold)
        uses: ./.github/actions/locked-restore
        with:
          target: tests/FS.GG.Governance.Cli.Tests/FS.GG.Governance.Cli.Tests.fsproj

      # The FULL suite gates the publish, WidthResilienceTests included. The earlier headless-determinism
      # gap (those tests asserted Spectre.Console rich-render line widths at narrow widths 10/20 and the CI
      # host wrapped unbreakable tokens differently than a local run) is fixed in spec 091: the width suite
      # now pins every wrap-affecting profile capability (Unicode/Legacy/encoding) so layout is a pure
      # function of (content, width), and asserts the real folding contract. The temporary
      # `FullyQualifiedName!~WidthResilience` exclusion is therefore removed (closes FS.GG.Governance#32).
      - name: Test (FS.GG.Governance.Cli)
        run: dotnet test tests/FS.GG.Governance.Cli.Tests/FS.GG.Governance.Cli.Tests.fsproj -c Release --no-restore

  # Pre-publish gate #2: the green-by-omission guard (FR-008, cli-enforcement.md). Packs the ACTUAL
  # tool, installs it, and runs `fsgg-governance route --mode gate` against committed handoff fixtures —
  # asserting exit 2 (failing) / 0 (passing) / 0 (light). A build whose packed tool does not enforce a
  # failing handoff fails here and never reaches `publish`. This is REAL evidence, not a unit test.
  enforcement-smoke:
    name: Enforcement smoke (green-by-omission guard)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [resolve-version, cli-tests]
    if: github.repository == 'FS-GG/FS.GG.Governance'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
          # No NuGet cache — see the cold restore below (#169).
          cache: false

      # run.sh packs the CLI, which restores IMPLICITLY — and an implicit restore is still a LOCKED one
      # in CI (Directory.Build.props sets RestoreLockedMode when GITHUB_ACTIONS=true and a lockfile
      # exists). So this job runs a lock gate whether or not it names one, and a warm package folder
      # degrades it exactly as it did the explicit gates. Restoring cold here primes the fresh
      # NUGET_PACKAGES (exported to GITHUB_ENV) that run.sh's own restore then resolves from.
      - name: Restore (locked, cold)
        uses: ./.github/actions/locked-restore
        with:
          target: src/FS.GG.Governance.Cli/FS.GG.Governance.Cli.fsproj

      - name: Pack + install + enforce (real evidence)
        run: bash tests/cli-publish-smoke/run.sh

  # Publish (LAST, gated). Only this job gains packages: write; the push uses the run-scoped
  # GITHUB_TOKEN (no PAT). `needs: enforcement-smoke` makes the green-by-omission guard a hard
  # pre-push gate. Single explicit project ⇒ single-package scope. --skip-duplicate makes a re-push of
  # an already-published version an idempotent no-op (version immutability); any other push failure
  # fails the run (FR-007 fail-safe). A dry-run dispatch (push=false) skips the push entirely.
  publish:
    name: Pack + publish FS.GG.Governance.Cli (fsgg-governance tool)
    needs: [resolve-version, cli-tests, enforcement-smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.repository == 'FS-GG/FS.GG.Governance'
    permissions:
      contents: read
      packages: write
      # 094: nuget.org push authenticates via Trusted Publishing (OIDC) — NuGet/login mints a
      # short-lived key from the run's id-token; no NUGET_ORG_API_KEY is stored (ADR-0013).
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
          # 101 (M-CI-3): warm the NuGet restore from the committed lockfiles (FR-006/008).
          # No NuGet cache: the locked restore below is cold by construction (#169), so a cache would be
          # restored and never read.
          cache: false

      # COLD locked restore (#169). This is the LAST lock gate before bytes are pushed to the org feed
      # and nuget.org: the artifact this job ships is built from the graph validated HERE, so it must be
      # validated against the feed rather than against a warm copy of a record of it.
      - name: Restore (locked, cold)
        uses: ./.github/actions/locked-restore
        with:
          target: src/FS.GG.Governance.Cli/FS.GG.Governance.Cli.fsproj

      # PackAsTool/ToolCommandName=fsgg-governance already on the fsproj; pack bundles the full runtime
      # closure (incl. Adapters.SddHandoff.dll) so the installed tool enforces standalone. Version comes
      # from the resolve-version job (the evaluated fsproj <Version>).
      - name: Pack
        run: |
          set -euo pipefail
          dotnet pack src/FS.GG.Governance.Cli/FS.GG.Governance.Cli.fsproj -c Release \
            -p:Version=${{ needs.resolve-version.outputs.version }} --no-restore -o artifacts/packages

      # A green gate plus an empty pack MUST NOT report success (FR-007): fail loudly if the expected
      # tool package was not produced.
      - name: Assert the tool package was produced
        run: |
          set -euo pipefail
          shopt -s nullglob
          packages=(artifacts/packages/FS.GG.Governance.Cli.*.nupkg)
          if [ ${#packages[@]} -eq 0 ]; then
            echo "::error::pack produced no FS.GG.Governance.Cli.*.nupkg — the gates passed but there is no tool package to publish."
            exit 1
          fi
          printf 'Packed: %s\n' "${packages[@]}"

      # Push only when push==true (a dry run skips this entirely). --skip-duplicate makes a re-publish of
      # an existing version an idempotent no-op success; any other push failure (auth/credential, network)
      # fails the run before any partial/mislabeled artifact can result (FR-007).
      - name: Push to the org feed
        if: needs.resolve-version.outputs.push == 'true'
        run: |
          set -euo pipefail
          dotnet nuget push "artifacts/packages/FS.GG.Governance.Cli.*.nupkg" \
            --source https://nuget.pkg.github.com/FS-GG/index.json \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --skip-duplicate

      # 094: mint a short-lived nuget.org key via Trusted Publishing (OIDC). No stored push secret —
      # login + push MUST live in THIS workflow file (never a reusable workflow — NuGet/login#6): the
      # trust policy is registered against FS.GG.Governance/publish.yml. A missing/mismatched policy
      # makes this step 401 and fails the run (fail-closed, FR-006). Runs only on a real publish so a
      # dry-run never mints a key or pushes. The profile falls back to the hardcoded owner if the
      # secret is absent (ADR-0013).
      - name: Trusted Publishing login (nuget.org)
        id: nuget-login
        if: needs.resolve-version.outputs.push == 'true'
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER || env.NUGET_FALLBACK_USER }}

      # Push the SAME already-packed .nupkg to nuget.org (no re-pack — byte-identical, ADR-0012 §3),
      # AFTER the org-feed push (org-feed-first, ADR-0012 §4). --skip-duplicate makes a re-publish of
      # an existing version an idempotent no-op (FR-007). Dry-run skips it (push=false).
      - name: Push to nuget.org (Trusted Publishing)
        if: needs.resolve-version.outputs.push == 'true'
        run: |
          set -euo pipefail
          dotnet nuget push "artifacts/packages/FS.GG.Governance.Cli.*.nupkg" \
            --source https://api.nuget.org/v3/index.json \
            --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
            --skip-duplicate

  # 094: publish the content-only FS.GG.Governance.ReferenceGateSet to BOTH feeds. Unlike the CLI, this
  # package had NO feed-publish path before (gate.yml only packed it into a throwaway temp feed to guard
  # byte-identity) — this job establishes it. It shares `push` (dry-run flag) from resolve-version, but
  # its VERSION is schema-derived by pack-reference-gate-set.fsx (ADR-0007), not the CLI <Version>. The
  # pack script self-runs the G1–G7 guard and refuses to pack when red — the hard pre-push gate (FR-004).
  publish-reference-gate-set:
    name: Pack + publish FS.GG.Governance.ReferenceGateSet (content-only)
    needs: [resolve-version]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.repository == 'FS-GG/FS.GG.Governance'
    permissions:
      contents: read
      packages: write
      # Trusted Publishing (OIDC) — same rationale as the CLI publish job (ADR-0013).
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
          # No NuGet cache — see the cold restore below (#169).
          cache: false

      # COLD locked restore (#169), and this job needed it MOST. Its only `needs:` is resolve-version,
      # which does not restore at all — so unlike every other publish job, NOTHING upstream of it
      # validated the committed lock, while pack-reference-gate-set.fsx restored IMPLICITLY (still a
      # locked restore in CI, per Directory.Build.props) against a warm, cached package folder. That is
      # a job that PUBLISHES to the org feed and nuget.org behind a lock gate that could not fail.
      # Whole-solution target deliberately: the packer runs the G1–G7 guard across the reference set, so
      # this validates the entire committed lock cold before any byte is shipped.
      - name: Restore (locked, cold)
        uses: ./.github/actions/locked-restore
        with:
          target: FS.GG.Governance.sln

      # Pack via the single canonical packer, reused as-is (Principle III). It runs the G1–G7
      # reference-set guard first and refuses to pack when red, so the shipped artifact is provably
      # the validated artifact (FR-004). The derived version comes from the four schemaVersion
      # declarations — no version is passed in here.
      - name: Pack (self-gated on G1–G7)
        run: dotnet fsi pack-reference-gate-set.fsx --output artifacts/packages

      # A green gate plus an empty pack MUST NOT report success (FR-007): fail loudly if the expected
      # content package was not produced (mirrors the CLI job's assert-produced guard).
      - name: Assert the gate-set package was produced
        run: |
          set -euo pipefail
          shopt -s nullglob
          packages=(artifacts/packages/FS.GG.Governance.ReferenceGateSet.*.nupkg)
          if [ ${#packages[@]} -eq 0 ]; then
            echo "::error::pack produced no FS.GG.Governance.ReferenceGateSet.*.nupkg — the G1–G7 guard passed but there is no content package to publish."
            exit 1
          fi
          printf 'Packed: %s\n' "${packages[@]}"

      # Org feed FIRST (org-feed-first, ADR-0012 §4). --skip-duplicate ⇒ idempotent re-publish
      # (FR-007). Dry-run (push=false) skips it.
      - name: Push to the org feed
        if: needs.resolve-version.outputs.push == 'true'
        run: |
          set -euo pipefail
          dotnet nuget push "artifacts/packages/FS.GG.Governance.ReferenceGateSet.*.nupkg" \
            --source https://nuget.pkg.github.com/FS-GG/index.json \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --skip-duplicate

      # Trusted Publishing login for nuget.org — same fail-closed contract as the CLI job.
      - name: Trusted Publishing login (nuget.org)
        id: nuget-login
        if: needs.resolve-version.outputs.push == 'true'
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER || env.NUGET_FALLBACK_USER }}

      # Push the SAME already-packed .nupkg to nuget.org (byte-identical, no re-pack — ADR-0012 §3),
      # after the org-feed push. --skip-duplicate ⇒ idempotent. Dry-run skips it.
      - name: Push to nuget.org (Trusted Publishing)
        if: needs.resolve-version.outputs.push == 'true'
        run: |
          set -euo pipefail
          dotnet nuget push "artifacts/packages/FS.GG.Governance.ReferenceGateSet.*.nupkg" \
            --source https://api.nuget.org/v3/index.json \
            --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
            --skip-duplicate
