name: gate

# Per-PR deterministic gate. Primary purpose (FS-GG/.github#7, Feature 211 parity): restore
# in --locked-mode against the committed packages.lock.json so any dependency-graph drift, or
# a silently substituted version (NU1603) / out-of-range version (NU1608), fails the build
# instead of resolving quietly. This is the first CI workflow in this repo, so it also builds
# the solution to give PRs a real signal.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # On-demand runs (e.g. to re-check API compatibility without a new commit). The advisory
  # api-compatibility-gate job is otherwise per-PR — see its scheduling note below (M-CI-3).
  workflow_dispatch:

concurrency:
  group: gate-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # Read the org GitHub Packages NuGet feed. FS.GG.Contracts is consumed by
  # FS.GG.Governance.Config; FS.GG.* are not on nuget.org but on the org feed. The package is
  # PUBLIC (owned by FS-GG/FS.GG.SDD), so the run-scoped GITHUB_TOKEN can read it cross-repo —
  # no PAT/secret needed. (GitHub Packages NuGet still requires a token even for public
  # packages, so the credential below is supplied; anonymous restore 401s.)
  packages: read

# Credentials for the `fsgg-github` source declared in nuget.config (env placeholders there),
# wired from the run-scoped token. Username can be any non-empty value for GitHub Packages.
env:
  FSGG_PACKAGES_ACTOR: ${{ github.actor }}
  FSGG_PACKAGES_READ_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  gate:
    name: Deterministic gate (locked restore + build)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: "10.0.x"
          # NO NuGet cache, deliberately (#169, FS-GG/.github#429, ADR-0031).
          #
          # This previously read `cache: true`, justified as "speed only — --locked-mode still
          # validates the graph". That justification was wrong, and it is the whole bug: NU1403 is
          # raised by comparing the lock file against the copy of the package ALREADY PRESENT in the
          # global-packages folder, so a cache hit means --locked-mode compares a record against a
          # record and NEVER CONTACTS THE FEED. A cache that can decide the verdict is not a cache.
          #
          # The locked-restore action below now resolves into a fresh, empty NUGET_PACKAGES with the
          # HTTP cache cleared, so this job's package folder is cold by construction and a
          # setup-dotnet cache would be pure overhead (restored, then never read).
          cache: false

      # Locked restore is the single enforcement point, and it is COLD — see the action. It restores
      # into a fresh package folder against the real feed, so a lock file no fresh clone could
      # restore fails HERE rather than sailing through on a warm hit.
      - name: Restore (locked, cold)
        uses: ./.github/actions/locked-restore
        with:
          target: FS.GG.Governance.sln

      # --no-restore: restore already happened above (exactly once), into the cold NUGET_PACKAGES the
      # action exported to GITHUB_ENV. NU1603/NU1608 are promoted to errors in Directory.Build.props.
      - name: Build (net10.0)
        run: dotnet build FS.GG.Governance.sln -c Debug --no-restore

  # 102 / H1 (#45): the gate above builds but never TESTED — before this job only 2 of the 83 test
  # projects ran anywhere in CI (ReferenceGateSet.Tests here, Cli.Tests in publish.yml on publish only),
  # so a logic regression in any of the other 81 merged green as long as it compiled. Run the WHOLE
  # Expecto suite on every PR via build.fsx (bounded -m:N, spec 080 — the 162-project graph thrashes
  # under default parallelism). SEPARATE job so a test failure is a distinct signal, not serialized
  # behind the build gate.
  #
  # NAME IS A CONTRACT: it must equal the required status-check context already registered in the
  # "main branch protection" ruleset (id 18430843). A typo → the required check never reports → every
  # PR blocks on a perpetually-pending check. Do not rename without updating the ruleset in lockstep.
  full-test-suite:
    name: Full test suite (dotnet fsi build.fsx test)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: "10.0.x"
          # No NuGet cache: the locked restore below is cold by construction, so a cache would be
          # restored and never read. See the `gate` job for why a warm folder breaks the gate (#169).
          cache: false

      # Single enforcement point: COLD locked restore against the committed packages.lock.json
      # (mirrors the `gate` job) so a graph drift fails here too, with one clear place pointing at
      # the regenerate command.
      - name: Restore (locked, cold)
        uses: ./.github/actions/locked-restore
        with:
          target: FS.GG.Governance.sln

      # Whole suite via the bounded entrypoint (spec 080): `test` builds then runs EVERY test project in
      # the solution. --no-restore keeps the locked restore above as the single restore; no --no-build
      # because build.fsx test builds as part of the run. A red assertion fails the job (no retries).
      - name: Test (full suite, bounded)
        run: dotnet fsi build.fsx test -c Debug --no-restore

  # 150: every OTHER job in this file builds and tests exclusively in Debug, so `-c Release` had no
  # coverage anywhere in CI — and `main` was green while `dotnet test -c Release` was red. That is not
  # hypothetical: it hid TWO independent defects at once (#148, the pack script's nested G1–G7 gate
  # hard-coding `-c Debug`; #149, the surface-drift assembly "touch" being elided in Release, crashing
  # FreshnessSensing.Tests at discovery). Release is also the configuration the artifacts actually SHIP
  # in (`pack` is always Release) and the reflex of anyone validating a change before merge — so an
  # uncovered Release lane bills its cost to whoever next runs the obvious command, on a diff that has
  # nothing to do with the breakage. One full Release suite catches this whole class.
  #
  # NAME IS A CONTRACT — as on full-test-suite, and as of #158 it binds: this context is REGISTERED in the
  # "main branch protection" ruleset (id 18430843), so the lane GATES — a red Release blocks the merge,
  # which is the defect it exists to close. The ruleset matches the `name:` below as an exact string, so a
  # rename or typo means the required context never reports and EVERY PR blocks on a perpetually-pending
  # check (it does not fail open — it wedges). Rename only by updating the ruleset in the same breath.
  full-test-suite-release:
    name: Full test suite — Release (dotnet fsi build.fsx test -c Release)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: "10.0.x"
          # No NuGet cache: the locked restore below is cold by construction, so a cache would be
          # restored and never read. See the `gate` job for why a warm folder breaks the gate (#169).
          cache: false

      # Single enforcement point: COLD locked restore against the committed packages.lock.json
      # (mirrors the `gate` job) so a graph drift fails here too. Restore is configuration-independent
      # — the assets file it writes serves both Debug and Release — so this is the same locked restore
      # as elsewhere.
      - name: Restore (locked, cold)
        uses: ./.github/actions/locked-restore
        with:
          target: FS.GG.Governance.sln

      # GATE ON THE EXIT CODE, NOT ON THE LOG (#149). A crash at test DISCOVERY — a throwing module
      # initializer, say — produces no "Failed!" line and tallies ZERO failures: #149 printed 64
      # "Passed!" suites, 0 failed, and still exited 1. Any gate that greps the log for failures calls
      # that green, and this lane would then repeat the bug it was added to catch. build.fsx propagates
      # dotnet's exit code (FR-009), so the command's own status IS the gate — do not "improve" this
      # step by parsing its output.
      - name: Test (full suite, bounded, Release)
        run: |
          set -euo pipefail
          if ! dotnet fsi build.fsx test -c Release --no-restore; then
            echo '::error::Release test suite failed. NOTE: a "0 failed" tally does not mean green — a crash at test discovery reports no failed test and still exits non-zero (#149). Reproduce locally with: dotnet fsi build.fsx test -c Release'
            exit 1
          fi

  # Sync-not-fork drift gate (spec 085, shared-build-config contract, ADR-0006). The three
  # managed build-config files (Directory.Build.props, Directory.Packages.props,
  # .config/dotnet-tools.json) must stay byte-identical to the org source of truth in
  # FS-GG/.github dist/dotnet/. This job checks out that repo and runs its drift check; a
  # hand-edit to a managed file (or an un-re-synced org baseline bump) fails the job. Run as
  # a SEPARATE job so a drift failure is a distinct signal, not serialized behind the build.
  # This job is KEPT DELIBERATELY even though the reusable coherence workflow (.github#18) has
  # landed and is already called below (the `contract-coherence` job, check-build-config=true).
  # The duplication is intentional: this job's `name:` is a REQUIRED status check on main, so
  # retiring it must happen in a change that updates branch protection in the same stroke — see
  # the `contract-coherence` job's comment and ADR-0036 (#592). Do not swap it out here. (#704)
  build-config-drift:
    name: Build-config drift check (shared-build-config)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v7

      # Source of truth: scripts/ + dist/dotnet/ must land together (the script resolves its
      # source as dirname(script)/../dist/dotnet). Track main — the live baseline — so an org
      # bump shows up here as red until this repo re-syncs (intended coherence pressure).
      - name: Checkout org build config (FS-GG/.github)
        uses: actions/checkout@v7
        with:
          repository: FS-GG/.github
          ref: main
          path: _org-build

      - name: Drift check (managed files == source of truth)
        run: _org-build/scripts/sync-build-config.sh --check "$GITHUB_WORKSPACE"

  # Reference-gate-set content package guard (spec 086, FS.GG.Governance#15). Runs the
  # ReferenceGateSet.Tests project, which (a) freezes the bundle invariants (079 G1–G7) and
  # (b) self-PRODUCES the real `.nupkg` via the checked-in pack-reference-gate-set.fsx — gated
  # on those same G1–G7 — and asserts the CI-produced artifact is byte-identical to the on-disk
  # samples (SC-002), content-only with no lib/ and no dependency group (SC-005), and
  # schema-versioned to a deterministic, distinguishable value (SC-003). A SEPARATE job so a
  # package-guard failure is a distinct signal, not serialized behind the build.
  reference-gate-set-pack:
    name: Reference gate set — pack guard (byte-identity + gated + versioned)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: "10.0.x"
          # No NuGet cache: the locked restore below is cold by construction, so a cache would be
          # restored and never read. See the `gate` job for why a warm folder breaks the gate (#169).
          cache: false

      # COLD locked restore of the guard project (and its references) so a graph drift fails here too.
      # Narrower target than the other jobs, deliberately: this job's scope is the one guard project.
      - name: Restore (locked, cold)
        uses: ./.github/actions/locked-restore
        with:
          target: tests/FS.GG.Governance.ReferenceGateSet.Tests/FS.GG.Governance.ReferenceGateSet.Tests.fsproj

      # Build once so the package guard can run the pre-pack G1–G7 gate against the already-built
      # assembly (the test sets FSGG_PACK_GATE_NO_BUILD so the nested gate uses --no-build).
      - name: Build guard project
        run: dotnet build tests/FS.GG.Governance.ReferenceGateSet.Tests/FS.GG.Governance.ReferenceGateSet.Tests.fsproj -c Debug --no-restore

      # Runs the 079 G1–G7 guard AND the 086 package guard. The package guard shells the pack
      # script to produce the .nupkg into a temp feed (no dependence on ~/.local/share/nuget-local).
      - name: Reference-gate-set guards (G1–G7 + packed-artifact)
        run: dotnet test tests/FS.GG.Governance.ReferenceGateSet.Tests/FS.GG.Governance.ReferenceGateSet.Tests.fsproj -c Debug --no-build

  # 088 Breaking-Change (API-Compat) gate — ADVISORY (spec 088, contracts/ci-gate.md). Packs every
  # IsPackable=true FS.GG.Governance.* project, compares each against its baseline package on the feed via
  # the SDK ApiCompat tool, and grades the per-package break signal × SemVer delta through the REAL pure
  # library (pack-and-apicheck.fsx). Reports per-package coverage (Checked / NoBaselineYet / NotCovered) and
  # any breaking-under-bump findings. ADVISORY: this job is NOT in branch-protection required checks and the
  # detector NEVER reddens the build (D7) — the single enforcement point is the ApiCompatibility release
  # rule's Maturity, promoted to BlockOnRelease (and this job to required checks) once SC-005 holds (US2).
  # At rollout most packages resolve NoBaseline (research D5) — reported honestly, never hidden (FR-007).
  # BASELINE / DETECTION IS INERT IN CI (CI-1) — the detector reads baselines from a folder feed
  # (`--baseline-feed`, default `~/.local/share/nuget-local`), and this job never SEEDS that feed: on the
  # runner it is empty, so every real package grades NoBaseline and NO live API break can surface. What IS
  # proven live is the GRADING PATH (`--selftest` exercises Checked:met/UNMET through the real pure
  # functions) and the tool RESOLUTION (apicompat resolves off PATH — M-CI-1's PARTIAL half). Live break
  # detection stays inert until a baseline SOURCE is wired — seed the feed from the org GitHub Packages feed
  # into a job-local dir and pass `--baseline-feed <dir>` (needs `packages: read`). This is a HARD
  # PRECONDITION for promoting the gate to required (US2 / SC-005): do NOT add this job to required checks
  # while it is baseline-blind, or a break-free-because-uncompared run would read as real coverage.
  # SCHEDULING (M-CI-3, revisited): kept PER-PR because the grading path + tool resolution are real and the
  # packing cost is worth paying where a break would be introduced — once a baseline feed is seeded the same
  # per-PR run surfaces the break. It stays advisory + continue-on-error (never blocks / serializes the
  # required checks) and is also runnable on demand via workflow_dispatch.
  api-compatibility-gate:
    name: API compatibility gate (breaking-change → SemVer major) [advisory]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Advisory: a non-zero here must never fail the PR while the gate is advisory.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: "10.0.x"
          # No NuGet cache: the locked restore below is cold by construction, so a cache would be
          # restored and never read. See the `gate` job for why a warm folder breaks the gate (#169).
          cache: false

      # COLD locked restore (repo convention) so a graph drift fails here too.
      - name: Restore (locked, cold)
        uses: ./.github/actions/locked-restore
        with:
          target: FS.GG.Governance.sln

      # The detector #r's the built leaf assemblies to GRADE through the real pure functions, so build first.
      # Bounded via build.fsx (the 162-project solution thrashes under default parallelism).
      - name: Build (bounded)
        run: dotnet fsi build.fsx --no-restore

      # Install the ApiCompat tool JOB-SCOPED (D6) — never in .config/dotnet-tools.json (drift-locked) — to an
      # explicit --tool-path we prepend to PATH, so the detector resolves the `apicompat` EXECUTABLE directly
      # (NOT `dotnet tool run apicompat`, which resolves only a local manifest we don't carry). Without an
      # on-PATH `apicompat` every package graded Indeterminate and Checked:met was unreachable (M-CI-1).
      # Advisory: a failed install still leaves the detector fail-safe (Indeterminate, never a clean pass).
      - name: Install ApiCompat tool (job-scoped, on PATH)
        continue-on-error: true
        run: |
          dotnet tool install --tool-path "$RUNNER_TEMP/apicompat-tool" Microsoft.DotNet.ApiCompat.Tool
          echo "$RUNNER_TEMP/apicompat-tool" >> "$GITHUB_PATH"

      # Run the detector: pack Release + ApiCompat vs the feed baseline → ApiBreakSignal set + coverage.
      # NOTE (CI-1): the feed is UNSEEDED here, so every real package grades NoBaseline — this run proves the
      # grading path (--selftest) and reports honest coverage, but detects no live break until a baseline
      # feed is wired (see the BASELINE note on the job). Exits 0 (advisory, D7); the rule renders the decision.
      - name: Detect + grade (advisory)
        run: |
          dotnet fsi pack-and-apicheck.fsx --selftest
          dotnet fsi pack-and-apicheck.fsx

  # ── Cross-repo contract-coherence gate ──────────────────────────────────────────────────
  # Adopted per FS-GG/.github#519 (decision: yes, the framework repos call it). The gate lives
  # in FS-GG/.github and is CALLED, never copied — it asserts that the org registry is
  # schema-valid and that its declared `fsgg-contracts` pin equals the ACTUAL FS.GG.Contracts
  # package version. This repo consumes FS.GG.Contracts, so a registry that has drifted from
  # the real package version is this repo's problem, and until now nothing here said so.
  #
  # `check-build-config` is left at its default (true) because registry/repos.yml declares this
  # repo a `build-config` receiver. That DUPLICATES the hand-rolled `build-config-drift` job in
  # this same file, and the duplication is DELIBERATE: that job's `name:` is a REQUIRED status
  # check on main, so deleting it here would leave a required context permanently unreported —
  # a PR that can never merge, which is exactly the silent deadlock FS-GG/.github#574's verifier
  # is being built to catch. Retiring the hand-rolled job must happen in a change that updates
  # this repo's branch protection in the same stroke. Tracked separately; do not "tidy" it away.
  #
  # `packages: read` is MANDATORY for callers: the gate restores the typed fsgg-sdd registry
  # validator from the org GitHub Packages feed using the run-scoped GITHUB_TOKEN.
  contract-coherence:
    uses: FS-GG/.github/.github/workflows/contract-coherence.yml@main
    permissions:
      contents: read
      packages: read
