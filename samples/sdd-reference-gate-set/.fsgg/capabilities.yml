schemaVersion: 2
domains:
  - build
  - test
  - evidence
  - gameplay
pathMap:
  - glob: "src/**"
    capability: build
  - glob: "*.sln"
    capability: build
  - glob: "tests/**"
    capability: test
  - glob: "build.fsx"
    capability: evidence
  - glob: "specs/**"
    capability: gameplay
surfaces:
  - id: public-api
    kind: package
    paths: ["src/**/*.fsi"]
    owner: platform
    maturity: block-on-ship
checks:
  - id: build
    domain: build
    command: dotnet-build
    owner: platform
    cost: medium
    environment: local-or-ci
    maturity: block-on-ship
    tier: restoreBuild
  - id: test
    domain: test
    command: dotnet-test
    owner: platform
    cost: high
    environment: ci
    maturity: block-on-ship
    tier: focusedTests
  - id: evidence
    domain: evidence
    command: build-evidence
    owner: platform
    cost: medium
    environment: local-or-ci
    maturity: warn
  # The per-FR gameplay-obligation gate (epic FS-GG/.github#1190, ADR-0049 / WI-8). Command-unbound
  # by design: satisfied by per-FR gameplay test evidence in the SDD handoff, not by a local tooling
  # command — the identical shape the embedded reference floor (Inheritance.referenceChecks) inherits
  # onto every `game` product. Binds at `block-on-ship`: a non-lowerable floor (WI-8 flip).
  - id: fr-covered
    domain: gameplay
    owner: platform
    cost: high
    environment: ci
    maturity: block-on-ship
