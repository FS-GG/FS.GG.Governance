schemaVersion: 2
# A generated product checked out on its own: every declared source path resolves only within the
# product root (no monorepo paths, no `..`). loadAndValidate + route + classify complete using only
# these sources (FR-009, SC-004).
domains:
  - package-api
  - docs
pathMap:
  - { glob: "src/**", capability: package-api }
  - { glob: "docs/**", capability: docs }
surfaces:
  - { id: public-api, kind: package, paths: ["src/**/*.fsi"], owner: platform, maturity: block-on-ship, baseline: "src/public-api.baseline.txt" }
  - { id: product-root, kind: generatedProduct, paths: ["src"], owner: platform, maturity: block-on-pr, templateProfile: fsharp-lib }
  - { id: guide-docs, kind: docs, paths: ["docs/**"], owner: docs, maturity: warn }
checks:
  - { id: scan, domain: package-api, owner: platform, cost: cheap, environment: local-or-ci, maturity: warn, tier: structuralScan }
  - { id: test, domain: package-api, owner: platform, cost: high, environment: ci, maturity: block-on-ship, tier: focusedTests }
